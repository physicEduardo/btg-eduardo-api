version: '3.8'

services:
  mongo:
    image: mongo:7.0
    container_name: mongo
    ports:
      - "27017:27017"
    networks:
      - app-network
    environment:
      MONGO_INITDB_DATABASE: btg

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: btg-app
    depends_on:
      - mongo
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/btg
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
